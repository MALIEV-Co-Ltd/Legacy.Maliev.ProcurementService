name: Build and test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    env:
      MalievWorkspaceRoot: ${{ github.workspace }}/.dependencies
    steps:
      - name: Check out ProcurementService
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Check out Legacy.Maliev.ServiceDefaults
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.ServiceDefaults
          ref: bcab875a7f703d1d9c2d535479e93653720eb62d
          path: .dependencies/Legacy.Maliev.ServiceDefaults
          persist-credentials: false
      - name: Check out Legacy.Maliev.CompatibilityContracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CompatibilityContracts
          ref: 95c62eb6209411f5aada443b315447a2f76ca0cd
          path: .dependencies/Legacy.Maliev.CompatibilityContracts
          persist-credentials: false
      - name: Validate .NET solution
        uses: MALIEV-Co-Ltd/Legacy.Maliev.Workflows/actions/dotnet-validate@6017816fa67f369d785ed30794f002cfd6299af7
        with:
          solution: Legacy.Maliev.ProcurementService.slnx
          use-local-maliev-dependencies: 'true'
